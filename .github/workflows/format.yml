name: Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          pipx install clang-format

      - name: Check formatting
        run: |
          find . -type f -name "*.[ch]" -print0 | xargs -0 clang-format --dry-run --Werror
